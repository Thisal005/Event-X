name:   Plan-X CI

on:
    push:
        branches:   [ "main" ]
    pull_request:
        branches:   [ "main"]
jobs:
    frontend-ci:
        runs-on: ubuntu-latest
        defaults:
            run:    
                working-directory:  ./FRONTEND/ticketing-system
        steps:
            -   name:   Checkout Code
                uses:   actions/checkout@v4

            -   name:   Setup Node.js
                uses:   actions/setup-node@v4
                with:
                    node-version: '20'
                    cache: 'npm'
                    cache-dependency-path: ./FRONTEND/ticketing-system/package-lock.json
            -   name:   Install Frontend Dependencies
                run:    npm install
            
            -   name:  Build Frontend
                run:    npm run build
        
    backend-ci:
        runs-on: ubuntu-latest
        defaults:
            run:    
                working-directory:  ./BACKEND/EventTicketingSystem
        steps:
            -   name:   Checkout Code
                uses:   actions/checkout@v4

            -   name:   Setup JDK
                uses:   actions/setup-java@v4
                with:
                    distribution: 'temurin'
                    java-version: '23'
                    cache: 'maven'
            
            -   name:   Build and test with Maven
                run:    mvn clean verify
    
    docker-build:
        runs-on: ubuntu-latest
        needs: [frontend-ci, backend-ci]
        steps:
            -   name:   Checkout Code
                uses:   actions/checkout@v4

            -   name:   Set up Docker Buildx
                uses:   docker/setup-buildx-action@v3
            
            - name: Login into DockerHub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            -   name:   Build and push Docker frontend image
                uses:   docker/build-push-action@v5
                with:
                    context: ./FRONTEND/ticketing-system
                    push: true
                    tags: |
                        ${{ secrets.DOCKER_USERNAME }}/plan-x-frontend:latest
                        ${{ secrets.DOCKER_USERNAME }}/plan-x-frontend:${{ github.sha }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max 

            -   name:   Build and push Docker backend image
                uses:   docker/build-push-action@v5
                with:
                    context: ./BACKEND/EventTicketingSystem
                    push: true
                    tags: |
                        ${{ secrets.DOCKER_USERNAME }}/plan-x-backend:latest
                        ${{ secrets.DOCKER_USERNAME }}/plan-x-backend:${{ github.sha }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max