apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventx-frontend-deployment
  labels:
    app: eventx-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eventx-frontend
  template:
    metadata:
      labels:
        app: eventx-frontend
    spec:
      containers:
      - name: eventx-frontend
        image: acreventthisal.azurecr.io/eventx-frontend:v1
        ports:
        - containerPort: 80