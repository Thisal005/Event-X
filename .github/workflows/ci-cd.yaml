name:   Plan-X CI

on:
    push:
        branches:   [ "main" ]
    pull_request:
        branches:   [ "main"]
jobs:
    frontend-ci:
        runs-on: ubuntu-latest
        defaults:
            run:    
                working-directory:  ./FRONTEND/ticketing-system
        steps:
            -   name:   Checkout Code
                uses:   actions/checkout@v4

            -   name:   Setup Node.js
                uses:   actions/setup-node@v4
                with:
                    node-version: '20'
                    cache: 'npm'
                    cache-dependency-path: ./FRONTEND/ticketing-system/package-lock.json
            -   name:   Install Frontend Dependencies
                run:    npm install
            
            -   name:  Build Frontend
                run:    npm run build